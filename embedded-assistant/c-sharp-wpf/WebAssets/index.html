<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corti Assistant WPF Example</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #status {
            padding: 12px;
            text-align: center;
            font-weight: 500;
            background: #e3f2fd;
            color: #1976d2;
        }

        corti-embedded {
            display: block;
            width: 100%;
            height: calc(100vh - 40px);
        }
    </style>
</head>
<body>
    <div id="status">Initializing...</div>
    <corti-embedded id="assistant"></corti-embedded>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
