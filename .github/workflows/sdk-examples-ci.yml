# Format check and build for SDK examples (runs only on PRs)
name: SDK Examples CI

on:
  pull_request:

jobs:
  dotnet:
    name: C# format & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/dotnet/web-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Build
        run: dotnet build --no-restore -c Release

  express-web-api:
    name: Express Web API lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript/express-web-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/typescript/express-web-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Build
        run: npm run build
